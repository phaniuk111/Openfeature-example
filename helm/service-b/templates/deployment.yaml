apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "service-b.fullname" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "service-b.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "service-b.name" . }}
    spec:
      containers:
        - name: service-b
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8082
          env:
            - name: APP_ENV
              value: {{ .Values.app.env | quote }}
            - name: APP_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: FLAG_MODE
              value: "per-env"
            - name: FLAG_BASE_PATH
              value: "/etc/flags"
          volumeMounts:
            - name: flags
              mountPath: /etc/flags
      volumes:
        - name: flags
          configMap:
            name: {{ include "service-b.fullname" . }}-flags
